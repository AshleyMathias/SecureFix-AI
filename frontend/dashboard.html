<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SecureFix AI · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warn: #d29922;
      --error: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }
    .layout {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    h1 span { color: var(--accent); }
    .controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.5rem;
      background: rgba(63, 185, 80, 0.15);
      color: var(--success);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }
    .live-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    select, button {
      font-family: inherit;
      font-size: 13px;
      padding: 0.4rem 0.75rem;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
    }
    select:focus, button:focus { outline: none; border-color: var(--accent); }
    .runs-summary {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }
    .stat-label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 0.25rem; }
    .stat-value { font-family: 'JetBrains Mono', monospace; font-weight: 500; }
    .feed {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .feed-header {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .feed-list {
      max-height: 420px;
      overflow-y: auto;
    }
    .event {
      display: flex;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
      font-size: 13px;
    }
    .event:last-child { border-bottom: none; }
    .event-time {
      flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      width: 72px;
    }
    .event-dot {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 0.35rem;
    }
    .event-dot.info { background: var(--accent); }
    .event-dot.error { background: var(--error); }
    .event-dot.warn { background: var(--warn); }
    .event-body { flex: 1; min-width: 0; }
    .event-msg { word-break: break-word; }
    .event-meta {
      margin-top: 0.2rem;
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .event-meta span { margin-right: 0.75rem; }
    .empty-state {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="layout">
    <header>
      <h1>SecureFix <span>AI</span></h1>
      <div class="controls">
        <span class="live-badge">Live</span>
        <select id="filterRun" aria-label="Filter by run">
          <option value="">All runs</option>
        </select>
        <button type="button" id="btnRefresh" aria-label="Refresh">Refresh</button>
      </div>
    </header>

    <div class="runs-summary" id="summary" aria-live="polite"></div>

    <section class="feed" aria-label="Activity log">
      <div class="feed-header">Activity log</div>
      <div class="feed-list" id="feedList">
        <div class="empty-state" id="emptyState">Loading…</div>
      </div>
    </section>
  </div>

  <script>
    const API_BASE = ''; // same origin
    const POLL_MS = 2500;

    function el(id) { return document.getElementById(id); }

    function formatTime(iso) {
      if (!iso) return '--';
      const d = new Date(iso);
      return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function levelDot(level) {
      if (!level) return 'info';
      const l = (level + '').toLowerCase();
      if (l === 'error') return 'error';
      if (l === 'warning' || l === 'warn') return 'warn';
      return 'info';
    }

    function renderEvents(events) {
      const list = el('feedList');
      const empty = el('emptyState');
      if (!events || events.length === 0) {
        list.innerHTML = '';
        list.appendChild(empty);
        empty.hidden = false;
        return;
      }
      empty.hidden = true;
      const runIds = new Set();
      events.forEach(e => { if (e.run_id_short || e.run_id) runIds.add(e.run_id_short || (e.run_id || '').slice(0, 8)); });
      const filterRun = el('filterRun');
      const currentFilter = filterRun.value;
      if (runIds.size > 0 && filterRun.length <= 1) {
        filterRun.innerHTML = '<option value="">All runs</option>';
        [...runIds].sort().forEach(id => {
          const o = document.createElement('option');
          o.value = id;
          o.textContent = id;
          filterRun.appendChild(o);
        });
        if (currentFilter) filterRun.value = currentFilter;
      }
      const filtered = currentFilter ? events.filter(e => (e.run_id_short || (e.run_id || '').slice(0, 8)) === currentFilter) : events;
      list.innerHTML = '';
      filtered.slice(-80).reverse().forEach(e => {
        if (e.event === 'dashboard_info') {
          const row = document.createElement('div');
          row.className = 'event';
          row.innerHTML = `
            <span class="event-time">—</span>
            <span class="event-dot info" aria-hidden="true"></span>
            <div class="event-body">
              <div class="event-msg">${escapeHtml(e.message || '')}</div>
            </div>`;
          list.appendChild(row);
          return;
        }
        const row = document.createElement('div');
        row.className = 'event';
        row.setAttribute('role', 'listitem');
        const time = formatTime(e.timestamp);
        const dot = levelDot(e.level);
        let meta = '';
        if (e.run_id_short) meta += `<span>run ${e.run_id_short}</span>`;
        if (e.repo) meta += `<span>${e.repo}</span>`;
        if (e.status) meta += `<span>${e.status}</span>`;
        row.innerHTML = `
          <span class="event-time">${time}</span>
          <span class="event-dot ${dot}" aria-hidden="true"></span>
          <div class="event-body">
            <div class="event-msg">${escapeHtml(e.message || e.event || '')}</div>
            ${meta ? `<div class="event-meta">${meta}</div>` : ''}
          </div>`;
        list.appendChild(row);
      });
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function renderSummary(events) {
      const summary = el('summary');
      const real = events.filter(e => e.event !== 'dashboard_info');
      const runs = new Set(real.map(e => e.run_id_short || (e.run_id || '').slice(0, 8)).filter(Boolean));
      const completed = real.filter(e => e.event === 'agent_run_complete' && e.status === 'completed').length;
      const aborted = real.filter(e => e.event === 'agent_run_complete' && e.status === 'aborted').length;
      const withPr = real.filter(e => e.pr_url).length;
      summary.innerHTML = `
        <div class="stat"><div class="stat-label">Runs</div><div class="stat-value">${runs.size}</div></div>
        <div class="stat"><div class="stat-label">Completed</div><div class="stat-value">${completed}</div></div>
        <div class="stat"><div class="stat-label">Aborted</div><div class="stat-value">${aborted}</div></div>
        <div class="stat"><div class="stat-label">PRs opened</div><div class="stat-value">${withPr}</div></div>
      `;
    }

    async function fetchLogs() {
      const filterRun = el('filterRun').value;
      const url = `${API_BASE}/api/recent-logs?limit=150${filterRun ? '&run_id=' + encodeURIComponent(filterRun) : ''}`;
      try {
        const r = await fetch(url);
        if (!r.ok) return;
        const data = await r.json();
        renderSummary(data);
        renderEvents(data);
      } catch (_) {}
    }

    el('btnRefresh').addEventListener('click', () => fetchLogs());
    el('filterRun').addEventListener('change', () => fetchLogs());
    fetchLogs();
    setInterval(fetchLogs, POLL_MS);
  </script>
</body>
</html>
